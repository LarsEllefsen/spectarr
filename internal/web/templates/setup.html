{{define "setup.html"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spectarr — Setup</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    body { max-width: 560px; margin: 4rem auto; padding: 0 1.5rem; }
    h1 { font-size: 1.6rem; margin-bottom: .25rem; }
    .subtitle { color: var(--pico-muted-color); margin-bottom: 2rem; }
    .badge-error { display:inline-block; padding:.2em .6em; border-radius:.3em; font-size:.8rem; background:#b5451b; color:#fff; margin-bottom:1rem; }
  </style>
</head>
<body>
  <h1>📡 Welcome to Spectarr</h1>
  <p class="subtitle">Connect your Specto and Radarr accounts to get started.</p>

  {{if .Error}}<span class="badge-error">{{.Error}}</span>{{end}}

  <form method="POST" action="/setup">
    <article>
      <header><strong>Specto Account</strong></header>
      <label>
        Email
        <input type="email" name="specto_email" value="{{index .Config "specto_email"}}" placeholder="you@example.com" required>
      </label>
      <label>
        Password
        <input type="password" name="specto_password" placeholder="••••••••" required>
      </label>
    </article>

    <article>
      <header><strong>Radarr</strong></header>
      <label>
        URL
        <input type="url" name="radarr_url" value="{{index .Config "radarr_url"}}" placeholder="http://localhost:7878" required>
      </label>
      <label>
        API Key
        <input type="text" name="radarr_api_key" placeholder="your-api-key" required>
      </label>
    </article>

    <article>
      <header><strong>Preferences</strong></header>
      <label>
        Minimum rating to sync (1–10)
        <input type="number" name="rating_threshold"
          value="{{index .Config "rating_threshold"}}"
          min="1" max="10" step="0.1" required>
      </label>
      <fieldset>
        <legend><small>Download behavior</small></legend>
        <label>
          <input type="radio" name="download_mode" value="automatic"
            {{if ne (index .Config "download_mode") "manual"}}checked{{end}}>
          Automatic — add matching movies to Radarr immediately
        </label>
        <label>
          <input type="radio" name="download_mode" value="manual"
            {{if eq (index .Config "download_mode") "manual"}}checked{{end}}>
          Manual — queue matching movies for review on the dashboard
        </label>
      </fieldset>
      <fieldset>
        <legend><small>Sync source</small></legend>
        <label>
          <input type="radio" name="sync_mode" value="all_friends"
            {{if ne (index .Config "sync_mode") "selected_friends"}}checked{{end}}>
          All friends
        </label>
        <label>
          <input type="radio" name="sync_mode" value="selected_friends"
            {{if eq (index .Config "sync_mode") "selected_friends"}}checked{{end}}>
          Selected friends <small>(configure in Settings after setup)</small>
        </label>
      </fieldset>
    </article>

    <button type="submit">Get Started</button>
  </form>
</body>
</html>
{{end}}
