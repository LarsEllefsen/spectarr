{{define "base"}}<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spectarr</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
  <style>
    body {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }

    /* ── Nav ── */
    .site-header {
      display: flex;
      align-items: center;
      padding: 1.5rem 0 1.25rem;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--pico-muted-border-color);
    }
    .site-title {
      flex: 1;
      margin: 0;
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--pico-color);
    }
    .site-nav a {
      margin-left: 1.75rem;
      font-size: .85rem;
      color: var(--pico-muted-color);
      text-decoration: none;
    }
    .site-nav a:hover { color: var(--pico-color); }

    /* ── Page header row ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.75rem;
    }
    .page-header h2 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
    }

    /* ── Section labels ── */
    .section-label {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--pico-muted-color);
      margin: 2rem 0 .75rem;
    }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: .2em .65em;
      border-radius: 999px;
      font-size: .72rem;
      font-weight: 500;
      letter-spacing: .02em;
    }
    .badge-ok      { background: rgba(45,106,79,.3);  color: #6fcf97; }
    .badge-error   { background: rgba(181,69,27,.3);  color: #eb8b6e; }
    .badge-info    { background: rgba(29,111,165,.3); color: #7ec8e3; }
    .badge-warning { background: rgba(180,140,30,.3); color: #f0c060; }

    /* ── Tables ── */
    table { width: 100%; font-size: .88rem; border-collapse: collapse; }
    thead th {
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--pico-muted-color);
      padding: .5rem .75rem;
      border-bottom: 1px solid var(--pico-muted-border-color);
    }
    tbody td { padding: .65rem .75rem; border-bottom: 1px solid var(--pico-muted-border-color); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr.error-row td { color: #eb8b6e; }

    /* ── Small buttons ── */
    .btn-xs {
      display: inline-block;
      padding: .25em .8em;
      font-size: .78rem;
      margin: 0;
      border-radius: var(--pico-border-radius);
      cursor: pointer;
      border: 1px solid var(--pico-primary);
      background: transparent;
      color: var(--pico-primary);
    }
    .btn-xs:hover { background: var(--pico-primary); color: #fff; }
    .btn-xs.muted {
      border-color: var(--pico-muted-border-color);
      color: var(--pico-muted-color);
    }
    .btn-xs.muted:hover { background: var(--pico-muted-border-color); color: var(--pico-color); }

    /* ── Pending movie cards ── */
    .pending-list { display: flex; flex-direction: column; gap: .6rem; margin-bottom: 1.5rem; }
    .pending-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: .75rem 1rem;
      background: var(--pico-card-background-color);
      border: 1px solid var(--pico-muted-border-color);
      border-radius: var(--pico-border-radius);
    }
    .pending-poster {
      width: 48px;
      height: 72px;
      object-fit: cover;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .pending-poster-placeholder {
      background: var(--pico-muted-border-color);
    }
    .pending-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: .2rem;
      min-width: 0;
    }
    .pending-title {
      font-weight: 500;
      font-size: .95rem;
      display: flex;
      align-items: center;
      gap: .6rem;
    }
    .pending-links { display: flex; gap: .35rem; }
    .pending-links a {
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .05em;
      padding: .1em .45em;
      border-radius: 3px;
      border: 1px solid var(--pico-muted-border-color);
      color: var(--pico-muted-color);
      text-decoration: none;
    }
    .pending-links a:hover { border-color: var(--pico-primary); color: var(--pico-primary); }
    .pending-meta { font-size: .82rem; color: var(--pico-muted-color); }
    .pending-queued { font-size: .75rem; color: var(--pico-muted-color); }
    .pending-actions { display: flex; flex-direction: column; gap: .4rem; flex-shrink: 0; }

    /* ── Settings sections ── */
    article {
      background: var(--pico-card-background-color);
      border: 1px solid var(--pico-muted-border-color);
      border-radius: var(--pico-border-radius);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }
    article header {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--pico-muted-color);
      margin-bottom: 1rem;
      padding-bottom: .6rem;
      border-bottom: 1px solid var(--pico-muted-border-color);
    }
  </style>
</head>
<body>
  <header class="site-header">
    <span class="site-title">Spectarr</span>
    <nav class="site-nav">
      <a href="/">Dashboard</a>
      <a href="/settings">Settings</a>
    </nav>
  </header>
  {{block "content" .}}{{end}}
</body>
</html>
{{end}}
